services:
  - type: web
    name: patois-translator-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false   # preencher manualmente no painel do Render
      - key: FRONTEND_URL
        sync: false   # ex: https://seu-app.vercel.app (sem trailing slash)
