<section class="hero">
  <div class="hero__badge">🎵 Reggae & Dancehall</div>
  <h1 class="hero__title">
    Patois <span class="hero__title--accent">Translator</span>
  </h1>
  <p class="hero__subtitle">
    Transcrição e tradução cultural de músicas jamaicanas para o Português do Brasil
  </p>
</section>

<div class="search-box">

  <!-- Tabs de modo de entrada -->
  <div class="mode-tabs" role="tablist">
    <button
      class="mode-tab"
      [class.mode-tab--active]="inputMode() === 'url'"
      (click)="setMode('url')"
      [disabled]="loading()"
      role="tab"
      [attr.aria-selected]="inputMode() === 'url'"
    >
      Link do YouTube
    </button>
    <button
      class="mode-tab"
      [class.mode-tab--active]="inputMode() === 'text'"
      (click)="setMode('text')"
      [disabled]="loading()"
      role="tab"
      [attr.aria-selected]="inputMode() === 'text'"
    >
      Colar Letra
    </button>
  </div>

  <!-- Modo URL -->
  @if (inputMode() === 'url') {
    <div class="search-box__inner">
      <input
        class="search-box__input"
        type="url"
        placeholder="Cole aqui o link do YouTube..."
        [ngModel]="url()"
        (ngModelChange)="url.set($event)"
        (keyup.enter)="translate()"
        [disabled]="loading()"
        aria-label="URL do YouTube"
      />
      <button
        class="search-box__btn"
        (click)="translate()"
        [disabled]="loading()"
        [class.search-box__btn--loading]="loading()"
      >
        @if (loading()) {
          <span class="spinner" aria-hidden="true"></span>
          <span>Processando...</span>
        } @else {
          <span>Traduzir</span>
        }
      </button>
    </div>
  }

  <!-- Modo Texto -->
  @if (inputMode() === 'text') {
    <div class="text-mode">
      <input
        class="text-mode__title"
        type="text"
        placeholder="Nome da música (opcional)"
        [ngModel]="songTitle()"
        (ngModelChange)="songTitle.set($event)"
        [disabled]="loading()"
        aria-label="Título da música"
      />
      <textarea
        class="text-mode__lyrics"
        placeholder="Cole aqui a letra original (em inglês / Patois)..."
        [ngModel]="lyricsText()"
        (ngModelChange)="lyricsText.set($event)"
        [disabled]="loading()"
        rows="8"
        aria-label="Letra da música"
      ></textarea>
      <button
        class="search-box__btn search-box__btn--full"
        (click)="translate()"
        [disabled]="loading()"
        [class.search-box__btn--loading]="loading()"
      >
        @if (loading()) {
          <span class="spinner" aria-hidden="true"></span>
          <span>Traduzindo...</span>
        } @else {
          <span>Traduzir</span>
        }
      </button>
    </div>
  }

  @if (loading()) {
    <output class="status-bar">
      <span class="status-bar__dot"></span>
      {{ statusMessage() }}
    </output>
  }

  @if (error()) {
    <div class="error-alert" role="alert">
      <span class="error-alert__icon">⚠️</span>
      <span>{{ error() }}</span>
    </div>
  }
</div>
