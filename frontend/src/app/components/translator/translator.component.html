<!-- Loading fullscreen -->
@if (loading()) {
  <output class="loading-overlay" aria-live="polite" aria-label="Traduzindo música">
    <div class="loading-content">

      <!-- Baseado animado -->
      <img
        class="joint-gif"
        src="https://media.giphy.com/media/iY0Ua99XEkkB6LaJzX/giphy.gif"
        alt="baseado queimando"
      />

      <!-- Frase rotativa -->
      <p class="loading-phrase">{{ currentPhrase() }}</p>
      <p class="loading-sub">~30 segundos • one love ✌️</p>

    </div>
  </output>
}

<section class="hero">
  <div class="hero__badge">🎵 Reggae & Dancehall</div>
  <h1 class="hero__title">
    Patois <span class="hero__title--accent">Translator</span>
  </h1>
  <p class="hero__subtitle">
    Transcrição e tradução cultural de músicas jamaicanas para o Português do Brasil
  </p>
</section>

<div class="search-box">
  <div class="mode-tabs">
    <button class="mode-tab" [class.mode-tab--active]="mode() === 'url'" (click)="setMode('url')" [disabled]="loading()">
      🔗 Link do YouTube
    </button>
    <button class="mode-tab" [class.mode-tab--active]="mode() === 'file'" (click)="setMode('file')" [disabled]="loading()">
      🎵 Enviar arquivo
    </button>
  </div>

  @if (mode() === 'url') {
    <div class="search-box__inner">
      <input
        class="search-box__input"
        type="url"
        placeholder="Cole aqui o link do YouTube (máx. 7 minutos)..."
        [ngModel]="url()"
        (ngModelChange)="url.set($event)"
        (keyup.enter)="translate()"
        [disabled]="loading()"
        aria-label="URL do YouTube"
      />
      <button class="search-box__btn" (click)="translate()" [disabled]="loading()">
        <span>Traduzir</span>
      </button>
    </div>
  }

  @if (mode() === 'file') {
    <div class="search-box__inner search-box__inner--file">
      <label class="file-label" [class.file-label--selected]="!!selectedFile()">
        @if (selectedFile()) {
          <span class="file-label__icon">🎵</span>
          <span class="file-label__name">{{ selectedFile()!.name }}</span>
        } @else {
          <span class="file-label__icon">📂</span>
          <span>Selecionar MP3 ou WAV (máx. 25 MB)</span>
        }
        <input type="file" accept=".mp3,.wav" class="file-input" (change)="onFileChange($event)" [disabled]="loading()" />
      </label>
      <button class="search-box__btn" (click)="translate()" [disabled]="loading() || !selectedFile()">
        <span>Traduzir</span>
      </button>
    </div>
  }

  @if (error()) {
    <div class="error-alert" role="alert">
      <span class="error-alert__icon">⚠️</span>
      <span>{{ error() }}</span>
    </div>
  }
</div>
